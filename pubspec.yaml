name: pert_daily_planner
description: A mobile-first offline daily planner powered by PERT three-point estimation.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.38.1'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^22.1.0
  flutter_timezone: ^5.1.0
  intl: ^0.20.3
  path: ^1.9.1
  shared_preferences: ^2.5.5
  sqflite: ^2.4.3
  timezone: ^0.11.1
  uuid: ^4.6.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

