name: Build APK and deploy web

# One workflow produces both installable and hosted deliverables.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test

  android:
    name: Build release APK
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build installable APK
        run: >-
          flutter build apk --release
          --build-name=1.0.${{ github.run_number }}
          --build-number=${{ github.run_number }}
      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: pert-daily-planner-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

  web:
    name: Build web app
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build web release
        run: flutter build web --release --base-href /GptDailyPlanner/
      - name: Upload web build artifact
        uses: actions/upload-artifact@v7
        with:
          name: pert-daily-planner-web-${{ github.run_number }}
          path: build/web
          if-no-files-found: error
          retention-days: 30
      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  pages:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: true
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
